name: Keep Render App Awake

on:
  schedule:
    - cron: '*/14 * * * *' # Runs every 14 minutes to prevent the 15-minute idle sleep
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping-server:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render deployment
        run: |
          curl -s --max-time 10 https://gate-tracker-u3ut.onrender.com > /dev/null
          echo "Pinged https://gate-tracker-u3ut.onrender.com to keep it awake!"
