services:
  - type: web
    name: gate-tracker-api
    runtime: python
    plan: free
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn gate_tracker.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: https://gate-tracker-wzwf.vercel.app/
      - key: CSRF_TRUSTED_ORIGINS
        sync: https://gate-tracker-wzwf.vercel.app/
      - key: DATABASE_URL
        fromDatabase:
          name: gate-tracker-db
          property: connectionString

databases:
  - name: gate-tracker-db
    plan: free
    databaseName: gate_tracker
